<script>
  import { getCurrentUser } from '$server/database/auth';
  import { getDatabases } from '$server/database/databases';
  import { getKvNamespaces } from '$server/database/kv';
  import { getR2Buckets } from '$server/database/r2';
  import StatsCard from '@kuratchi/ui/stats-card.html';
  import CardGrid from '@kuratchi/ui/card-grid.html';
  import Card from '@kuratchi/ui/card.html';
  import { url } from '@kuratchi/js/request';

  const user = await getCurrentUser();
  const databases = user ? await getDatabases() : [];
  const kvNamespaces = user ? await getKvNamespaces() : [];
  const r2Buckets = user ? await getR2Buckets() : [];

  const baseUrl = user ? `${url.protocol}//${url.host}` : '';
</script>

if (!user) {
  <head>
    <meta http-equiv="refresh" content="0;url=/auth/signin" />
  </head>
  <p>Redirecting to sign in...</p>
} else {
  <header>
    <div>
      <h1>Dashboard</h1>
    </div>
  </header>

  <CardGrid>
    <StatsCard
      title="Databases"
      value={String(databases.length)}
      description="D1 relational databases"
    />
    <StatsCard
      title="KV Namespaces"
      value={String(kvNamespaces.length)}
      description="Key-value stores"
    />
    <StatsCard
      title="R2 Buckets"
      value={String(r2Buckets.length)}
      description="Object storage buckets"
    />
  </CardGrid>

  <Card title="Quick Actions">
    <nav data-cluster>
      <!-- <a href="/drover" data-variant="secondary" data-type="button">View Drover Usage</a> -->
      <a href="/databases" data-variant="primary" data-type="button">Manage Databases</a>
      <a href="/kv" data-variant="secondary" data-type="button">Manage KV</a>
      <a href="/r2" data-variant="secondary" data-type="button">Manage R2</a>
    </nav>
  </Card>
}
