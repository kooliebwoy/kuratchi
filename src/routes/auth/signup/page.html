<script>
  import { env } from 'cloudflare:workers';
  import { signUp } from '$server/database/auth';
  import AuthCard from '@kuratchi/ui/auth-card.html';

  const turnstileSiteKey = (env as any).TURNSTILE_SITE_KEY || '';
</script>

<AuthCard
  title="Create Account"
  subtitle="Sign up to get started"
  footerText="Already have an account?"
  footerLink="Sign in"
  footerHref="/auth/signin"
  error={signUp.error}
>
  if (turnstileSiteKey) {
    <head>
      <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    </head>
  }
  <form action={signUp} method="POST" class="kui-auth-form">
    <div class="kui-field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" />
    </div>
    <div class="kui-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="kui-field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="********" required autocomplete="new-password" minlength="8" />
    </div>
    if (turnstileSiteKey) {
      <div class="kui-field">
        <div class="cf-turnstile" data-sitekey={turnstileSiteKey} data-action="signup"></div>
      </div>
    }
    <button type="submit" class="kui-button kui-button--primary kui-button--block kui-auth-submit">Create Account</button>
  </form>
</AuthCard>
