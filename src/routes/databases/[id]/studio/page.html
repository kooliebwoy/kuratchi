<script>
  import { getDatabaseStudioData, runSqlQuery, insertTableRow, deleteTableRow, updateTableRow } from '$server/database/db-studio';
  import DatabaseStudio from '@kuratchi/db-studio/db-studio.html';

  const {
    database,
    tables, activeTable, rows, columns, schema,
    totalRows, page, totalPages,
    sqlQuery, sqlResult, dbError,
  } = await getDatabaseStudioData();
</script>

if (database) {
  if (!database.workerName) {
    <p data-muted>No worker deployed for this database. Deploy first to use the studio.</p>
  } else {
    <DatabaseStudio
      tables={tables}
      activeTable={activeTable}
      rows={rows}
      columns={columns}
      schema={schema}
      totalRows={totalRows}
      page={page}
      totalPages={totalPages}
      sqlQuery={sqlQuery}
      sqlResult={sqlResult}
      dbError={dbError}
      baseHref={`/databases/${database.id}/studio`}
      sqlPlaceholder="SELECT * FROM migrations_history"
      runQueryAction={runSqlQuery}
      insertRowAction={insertTableRow}
      deleteRowAction={deleteTableRow}
      updateRowAction={updateTableRow}
    />
  }
}
