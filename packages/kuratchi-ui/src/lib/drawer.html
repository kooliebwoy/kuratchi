<script>
  const {
    id,
    dismissible = true,
    class: className = '',
    title = '',
    subtitle = '',
    showCloseButton = true
  } = props;
  const titleId = id + '-title';
</script>

<aside id="{id}" popover={dismissible ? 'auto' : 'manual'} class="kui-drawer {className}" data-size={props.data_size} data-side={props.data_side || 'right'} aria-labelledby={title ? titleId : undefined}>
  <header class="kui-drawer__header">
    <div class="kui-drawer__header-content">
      if (title) {
        <h2 id="{titleId}" class="kui-drawer__title">{title}</h2>
      }
      if (subtitle) {
        <p class="kui-drawer__subtitle">{subtitle}</p>
      }
    </div>
    if (showCloseButton) {
      <button type="button" class="kui-drawer__close" commandfor="{id}" command="hide-popover" aria-label="Close drawer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    }
  </header>
  <div class="kui-drawer__content">
    <slot></slot>
  </div>
</aside>
