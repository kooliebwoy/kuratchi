<script>
  const {
    position = 'bottom',
    class: className = '',
    contentClass = ''
  } = props;
  const panelId = 'kui-dd-' + Math.random().toString(36).substr(2, 8);
</script>

<div class="kui-dropdown {className}" data-position="{position}" role="presentation">
  <button type="button" class="kui-dropdown__trigger" style="anchor-name: --{panelId}" commandfor="{panelId}" command="toggle-popover" aria-haspopup="true">
    {@raw props.trigger || ""}
  </button>
  <div id="{panelId}" popover="auto" class="kui-dropdown__panel {contentClass}" style="position-anchor: --{panelId}" data-position="{position}" role="menu">
    <slot></slot>
  </div>
</div>
