<script>
  const { class: className = '' } = props;
</script>

<button type="button" class="kui-theme-toggle {className}" aria-label="Toggle theme">
  <svg class="kui-theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
  </svg>
  <svg class="kui-theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
  </svg>
</button>

<script>
(function () {
  var toggles = document.querySelectorAll('.kui-theme-toggle');

  function syncToggles() {
    var dark = document.documentElement.classList.contains('dark');
    for (var i = 0; i < toggles.length; i++) {
      toggles[i].setAttribute('data-theme', dark ? 'dark' : 'light');
    }
  }

  syncToggles();

  for (var i = 0; i < toggles.length; i++) {
    toggles[i].addEventListener('click', function () {
      document.documentElement.classList.toggle('dark');
      var isDark = document.documentElement.classList.contains('dark');
      try { localStorage.setItem('kui-theme', isDark ? 'dark' : 'light'); } catch (e) {}
      syncToggles();
    });
  }
})();
</script>
