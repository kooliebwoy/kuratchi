[package]
name = "workerd-desktop-host"
version = "0.1.0"
edition = "2024"

[dependencies]
base64 = "0.22"
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tao = "0.34"
wry = "0.53"

[target.'cfg(target_os = "macos")'.dependencies]
muda = "0.16"

[target.'cfg(windows)'.dependencies]
winrt-notification = "0.5"
